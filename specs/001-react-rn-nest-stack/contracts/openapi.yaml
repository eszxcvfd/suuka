openapi: 3.0.3
info:
  title: Cross-Platform Core Platform API
  version: 0.1.0
servers:
  - url: https://api.example.com
paths:
  /v1/auth/sign-up:
    post:
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Account created
  /v1/auth/sign-in:
    post:
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /v1/auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200':
          description: Refreshed session
  /v1/auth/sign-out:
    post:
      summary: Revoke current session
      responses:
        '204':
          description: Signed out
  /v1/users/me:
    get:
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /v1/media:
    get:
      summary: List user media
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Media list
    post:
      summary: Upload media
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Media uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
  /v1/health:
    get:
      summary: Service health
      responses:
        '200':
          description: Health check
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SignUpRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 2
          maxLength: 60
    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthSession:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      required: [id, email, displayName, status]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        status:
          type: string
          enum: [active, suspended, deleted]
    MediaAsset:
      type: object
      required: [id, ownerUserId, publicId, secureUrl, resourceType, status]
      properties:
        id:
          type: string
        ownerUserId:
          type: string
        publicId:
          type: string
        secureUrl:
          type: string
          format: uri
        resourceType:
          type: string
          enum: [image, video, raw]
        status:
          type: string
          enum: [uploaded, processing, ready, failed, deleted]
